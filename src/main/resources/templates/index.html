<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Tareas</title>

    <link rel="stylesheet" th:href="@{/css/Task.css}">
</head>

<body>

    <div class="container">

        <header>

            <h1>Gestión de Tareas</h1>

            <a th:href="@{/tasks/new}" class="btn-primary">
                + Nueva tarea
            </a>

        </header>

        <!-- Buscar por ID -->
        <form method="get" th:action="@{/}" class="filters">

            <input
                type="number"
                name="id"
                placeholder="Buscar tarea por ID">

            <button
                type="submit"
                class="btn-primary">
                Buscar
            </button>

        </form>

        <!-- Filtrar por estado -->
        <form method="get" th:action="@{/}" class="filters">

            <select name="state">

                <option value="">
                    Todos los estados
                </option>

                <option value="Pendiente">
                    Pendiente
                </option>

                <option value="En proceso">
                    En proceso
                </option>

                <option value="Completada">
                    Completada
                </option>

            </select>

            <button
                type="submit"
                class="btn-primary">
                Filtrar
            </button>

        </form>

        <table>

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Descripción</th>
                    <th>Fecha creación</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>

            </thead>

            <tbody>

                <tr th:each="task : ${tasks}">

                    <td th:text="${task.id}"></td>

                    <td th:text="${task.title}"></td>

                    <td th:text="${task.description}"></td>

                    <td th:text="${task.dateCreation}"></td>

                    <td>

                        <span
                            th:if="${task.state == 'Pendiente'}"
                            class="status status-pendiente">
                            Pendiente
                        </span>

                        <span
                            th:if="${task.state == 'En proceso'}"
                            class="status status-proceso">
                            En proceso
                        </span>

                        <span
                            th:if="${task.state == 'Completada'}"
                            class="status status-completada">
                            Completada
                        </span>

                    </td>

                    <td>

                        <a
                            th:href="@{/tasks/edit/{id}(id=${task.id})}"
                            class="btn-edit">
                            Editar
                        </a>

                        <form
                            th:action="@{/tasks/delete/{id}(id=${task.id})}"
                            method="post"
                            style="display:inline;">

                            <button
                                type="submit"
                                class="btn-delete">
                                Eliminar
                            </button>

                        </form>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</body>

</html>
